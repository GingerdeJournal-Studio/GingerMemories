<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="svg" href="https://pub-7c8122dd7ae64deeab493bc5ad81ec0d.r2.dev/GingerMemories_Logo/GingerMemories%20Logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cssFiles/index.css"/>
    <meta charset="UTF-8" />
    <title>回忆共镜</title>
</head>

<body>
    <div class="card">
        <div class="logo"></div>
        <h1>回忆共镜</h1>
        <h3>写下你的故事来分享你的感受吧！</h3>

        <div id="login" class="login">
            <p class="questions">请输入你的邮箱：</p>
            <input id="emailLogin" placeholder="邮箱" />
            <p class="questions">请输入你的密码：</p>
            <input id="passwordLogin" type="password" placeholder="密码" />
            <p class="lORr"d>还没有账号？<button class="loginORregister" onclick="register()">点击请注册</button></p>

            <button id="login-btn" style="width: 100%; background: #112d4e; margin-top: 15px;">点击登陆</button>
        </div>

        <div id="register" style="display: none;" class="register">
            <p class="questions">请输入你的邮箱：</p>
            <input id="emailRegister" placeholder="邮箱" />
            <p class="questions">请设置你的密码：</p>
            <input id="passwordRegister" type="password" placeholder="密码" />
            <p class="lORr">已经有账号？<button class="loginORregister" onclick="login()">点击请登陆</button></p>

            <button id="register-btn" style="width: 100%; background: #112d4e; margin-top: 15px;">点击注册</button>
        </div>

<!--        <button id="google-btn" style="background:#3f72af; margin-top: -10px;">使用谷歌账号登陆</button>-->

    </div>

    <script type="module" src="auth.js"></script>
    <script>
        function register() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('register').style.display = 'block';
        }

        function login() {
            document.getElementById('register').style.display = 'none';
            document.getElementById('login').style.display = 'block';
        }
    </script>
</body>
</html>
